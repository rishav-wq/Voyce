<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voyce — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f4f0e8; font-family: 'Poppins', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .auth-logo { font-size: 28px; font-weight: 800; color: #1c1813; margin-bottom: 6px; text-align: center; }
    .auth-logo span { color: #6c47ff; }
    .auth-tagline { font-size: 14px; color: #888; margin-bottom: 32px; text-align: center; }
    #clerk-sign-in { width: 100%; max-width: 420px; }
  </style>
</head>
<body>
  <div class="auth-logo">V<span>oyce</span></div>
  <p class="auth-tagline">LinkedIn posts that sound like you.</p>
  <div id="clerk-sign-in"></div>

  <script>
    async function startApp() {
      const clerk = window.Clerk;
      await clerk.load();

      if (clerk.user) {
        // Already signed in — sync with backend then redirect
        try {
          const token = await clerk.session.getToken();
          const res   = await fetch("/auth/me", { headers: { "x-token": token } });
          if (res.ok) {
            const user = await res.json();
            localStorage.setItem("cm_user", JSON.stringify(user));
          }
        } catch (_) {}
        window.location.href = "/setup";
        return;
      }

      clerk.mountSignIn(document.getElementById("clerk-sign-in"), {
        routing:        "virtual",
        afterSignInUrl:  "/setup",
        afterSignUpUrl:  "/onboarding",
        appearance: {
          variables: {
            colorPrimary: "#6c47ff",
            fontFamily:   "Poppins, sans-serif",
            borderRadius: "10px",
          }
        }
      });
    }
  </script>

  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_Y2hhbXBpb24tZ3JvdXNlLTY3LmNsZXJrLmFjY291bnRzLmRldiQ"
    src="https://champion-grouse-67.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    onload="startApp()"
  ></script>
</body>
</html>
